<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation - MbeejFepal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-spinner fa-pulse"></i>
            </div>
            <h1>Activation en cours...</h1>
            <p>Votre connexion internet est en cours d'activation.</p>
            <div class="spinner" style="margin: 20px auto;"></div>
        </div>
    </div>
    <script>
        const API_URL = 'http://localhost:8080';
        const routerId = localStorage.getItem('router_id');
        const mac = localStorage.getItem('mac');
        let attempts = 0;
        
        function checkConnection() {
            attempts++;
            fetch(`${API_URL}/api/sessions/status?router_id=${routerId}&mac=${mac}`)
                .then(res => res.json())
                .then(data => {
                    if (data.active) {
                        document.querySelector('.success-card').innerHTML = `
                            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                            <h1>Connexion activée !</h1>
                            <p>Vous pouvez maintenant naviguer sur internet.</p>
                            <button onclick="window.location.href='http://neverssl.com'" class="btn btn-primary">
                                <i class="fas fa-globe"></i> Commencer
                            </button>
                        `;
                    } else if (attempts < 30) {
                        setTimeout(checkConnection, 1000);
                    } else {
                        document.querySelector('.success-card').innerHTML = `
                            <div class="success-icon"><i class="fas fa-clock"></i></div>
                            <h1>Activation en retard</h1>
                            <p>Votre paiement est validé. La connexion sera active dans quelques instants.</p>
                            <button onclick="window.location.href='hotspot.html'" class="btn btn-primary">
                                Vérifier le statut
                            </button>
                        `;
                    }
                })
                .catch(() => {
                    if (attempts < 30) setTimeout(checkConnection, 1000);
                });
        }
        
        setTimeout(checkConnection, 2000);
    </script>
</body>
</html>
