<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Paiement réussi - MbeejFepal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Paiement réussi !</h1>
            <p>Votre connexion internet est activée.</p>
            <p class="small">Vous allez être redirigé dans quelques secondes...</p>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <button onclick="window.location.href='http://neverssl.com'" class="btn btn-primary">
                <i class="fas fa-globe"></i> Continuer maintenant
            </button>
        </div>
    </div>

    <script>
        let countdown = 10;
        const progress = document.getElementById('progress');
        
        const timer = setInterval(() => {
            countdown--;
            progress.style.width = (10 - countdown) * 10 + '%';
            
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = 'http://neverssl.com';
            }
        }, 1000);
    </script>
</body>
</html>
