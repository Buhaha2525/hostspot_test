<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBEEJ FEPAL - Portail Hotspot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.95);
            color: #333;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
        }
        .info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 MBEEJ FEPAL</h1>
        <p>Connexion haut débit sécurisée</p>
        
        <div class="info">
            <strong>📱 MAC:</strong> <span id="mac">--</span><br>
            <strong>💻 IP:</strong> <span id="ip">--</span><br>
            <strong>🏠 Routeur ID:</strong> <span id="routerId">--</span>
        </div>
        
        <h3>🎁 Forfaits Internet</h3>
        <button onclick="buy('1000', '24h')">💰 1000 FCFA - 24h</button>
        <button onclick="buy('2000', '7j')">🚀 2000 FCFA - 7 jours</button>
        <button onclick="buy('5000', '30j')">💎 5000 FCFA - 30 jours</button>
        
        <p id="status" style="margin-top: 20px; font-size: 12px;"></p>
    </div>
    
    <script>
        // Récupérer les paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const routerId = urlParams.get('router_id') || 'Non fourni';
        const mac = urlParams.get('mac') || 'Non fourni';
        const ip = urlParams.get('ip') || 'Non fourni';
        
        // Afficher les informations
        document.getElementById('routerId').innerText = routerId;
        document.getElementById('mac').innerText = mac;
        document.getElementById('ip').innerText = ip;
        
        function buy(price, duration) {
            document.getElementById('status').innerHTML = `🔄 Paiement de ${price} FCFA pour ${duration}...`;
            // Ici, vous ajouterez la logique de paiement (Orange Money, Wave, etc.)
            setTimeout(() => {
                document.getElementById('status').innerHTML = `✅ Authentification réussie ! Vous pouvez surfer.`;
            }, 2000);
        }
        
        // Log pour debug
        console.log('URL:', window.location.href);
        console.log('Paramètres reçus:', {routerId, mac, ip});
    </script>
</body>
</html>
