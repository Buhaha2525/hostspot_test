<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBEEJ FEPAL - Portail Hotspot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            background: rgba(255,255,255,0.98);
            color: #333;
            padding: 35px 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            margin: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .info {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
            border-left: 4px solid #667eea;
        }
        
        .info strong {
            color: #667eea;
            display: inline-block;
            width: 90px;
        }
        
        .info div {
            margin: 8px 0;
            font-family: monospace;
            font-size: 14px;
        }
        
        .router-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        h3 {
            color: #333;
            margin: 25px 0 15px 0;
            font-size: 20px;
        }
        
        .plans {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        
        button {
            background: white;
            color: #333;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        
        .plan-price {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .plan-duration {
            color: #666;
            font-size: 14px;
        }
        
        .plan-name {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #999;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            
            button {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 MBEEJ FEPAL</h1>
        <p class="subtitle">Connexion haut débit sécurisée</p>
        
        <div class="info">
            <div><strong>📱 MAC:</strong> <span id="mac">--</span></div>
            <div><strong>💻 IP:</strong> <span id="ip">--</span></div>
            <div><strong>🏠 Routeur ID:</strong> <span id="routerId">--</span></div>
            <div id="routerInfo" style="margin-top: 8px;"></div>
        </div>
        
        <h3>🎁 Forfaits Internet</h3>
        <div class="plans">
            <button onclick="buy('1000', '24h', 'standard')">
                <div class="plan-name">
                    <span>💰 Forfait Journalier</span>
                    <span class="plan-duration">Validité 24 heures</span>
                </div>
                <span class="plan-price">1000 FCFA</span>
            </button>
            
            <button onclick="buy('2000', '7j', 'premium')">
                <div class="plan-name">
                    <span>🚀 Forfait Hebdomadaire</span>
                    <span class="plan-duration">Validité 7 jours</span>
                </div>
                <span class="plan-price">2000 FCFA</span>
            </button>
            
            <button onclick="buy('5000', '30j', 'vip')">
                <div class="plan-name">
                    <span>💎 Forfait Mensuel</span>
                    <span class="plan-duration">Validité 30 jours</span>
                </div>
                <span class="plan-price">5000 FCFA</span>
            </button>
        </div>
        
        <div id="status" class="status"></div>
        <div class="footer">
            🔒 Paiement sécurisé via Orange Money, Wave, Free Money
        </div>
    </div>
    
    <script>
        // Configuration des routeurs
        const routerConfig = {
            1: { name: 'Routeur Principal', location: 'Dakar Centre', speed: '100 Mbps' },
            2: { name: 'Routeur Secondaire', location: 'Pikine', speed: '50 Mbps' },
            3: { name: 'Routeur Tertiaire', location: 'Guédiawaye', speed: '50 Mbps' },
            default: { name: 'Routeur Standard', location: 'Non spécifié', speed: 'Variable' }
        };
        
        // Récupérer les paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        let routerId = urlParams.get('router_id');
        const mac = urlParams.get('mac') || generateRandomMac();
        const ip = urlParams.get('ip') || generateRandomIp();
        
        // Valider et traiter router_id
        if (routerId && (routerId === '2' || routerId === '3')) {
            // Accepter router_id=2 ou 3
            routerId = parseInt(routerId);
            console.log(`✅ Routeur ${routerId} sélectionné`);
        } else if (routerId && !isNaN(parseInt(routerId))) {
            routerId = parseInt(routerId);
            if (!routerConfig[routerId]) {
                console.warn(`⚠️ Routeur ${routerId} non configuré, utilisation du routeur par défaut`);
                routerId = 'default';
            }
        } else {
            routerId = 'default';
            console.log('ℹ️ Aucun routeur spécifié, utilisation du routeur par défaut');
        }
        
        // Obtenir la configuration du routeur
        const router = routerConfig[routerId] || routerConfig.default;
        const displayRouterId = (routerId === 'default' ? 'Non spécifié' : routerId);
        
        // Afficher les informations
        document.getElementById('routerId').innerHTML = `<strong>${displayRouterId}</strong>`;
        document.getElementById('mac').innerText = mac;
        document.getElementById('ip').innerText = ip;
        
        // Ajouter des informations supplémentaires sur le routeur
        const routerInfoDiv = document.getElementById('routerInfo');
        if (routerId !== 'default') {
            routerInfoDiv.innerHTML = `
                <div style="margin-top: 10px; padding-top: 8px; border-top: 1px solid #ddd;">
                    <div><strong>📍 Lieu:</strong> ${router.location}</div>
                    <div><strong>⚡ Débit:</strong> ${router.speed}</div>
                    <div><span class="router-badge">Routeur actif</span></div>
                </div>
            `;
        } else {
            routerInfoDiv.innerHTML = `<div style="margin-top: 8px;"><span class="router-badge">Mode démo</span></div>`;
        }
        
        // Fonction pour générer une MAC aléatoire si non fournie
        function generateRandomMac() {
            return 'XX:XX:XX:XX:XX:XX'.replace(/X/g, function() {
                return '0123456789ABCDEF'.charAt(Math.floor(Math.random() * 16));
            });
        }
        
        // Fonction pour générer une IP aléatoire si non fournie
        function generateRandomIp() {
            return `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`;
        }
        
        // Fonction d'achat avec gestion des routeurs
        function buy(price, duration, planType) {
            const statusDiv = document.getElementById('status');
            const routerValue = (routerId === 'default' ? 'Non spécifié' : routerId);
            
            // Afficher le chargement
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = `🔄 Traitement du paiement de ${price} FCFA pour ${duration}...<br><small>Routeur ${routerValue}</small>`;
            
            // Simuler l'appel API de paiement
            setTimeout(() => {
                // Générer un ID de transaction unique
                const transactionId = 'TXN' + Date.now() + Math.floor(Math.random() * 1000);
                
                // Ici, vous intégrerez la vraie logique de paiement
                // Exemple: Appel API Orange Money, Wave, etc.
                
                // Simuler une réponse de succès
                const success = true; // Mettre à false pour tester l'erreur
                
                if (success) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        ✅ <strong>Authentification réussie !</strong><br>
                        🎉 Forfait ${planType === 'standard' ? 'Journalier' : planType === 'premium' ? 'Hebdomadaire' : 'Mensuel'} activé<br>
                        💳 Transaction: ${transactionId}<br>
                        📡 Routeur: ${router.name} (ID: ${routerValue})<br>
                        ⏱️ Durée: ${duration}<br>
                        🌐 Vous pouvez maintenant surfer librement !
                    `;
                    
                    // Log pour le débogage
                    console.log('Transaction réussie:', {
                        routerId: routerValue,
                        routerName: router.name,
                        price: price,
                        duration: duration,
                        planType: planType,
                        transactionId: transactionId,
                        mac: mac,
                        ip: ip,
                        timestamp: new Date().toISOString()
                    });
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = `
                        ❌ <strong>Échec du paiement</strong><br>
                        Veuillez réessayer ou contacter le support.<br>
                        <small>Code erreur: PAY_${Math.floor(Math.random() * 100)}</small>
                    `;
                }
            }, 2000);
        }
        
        // Fonction pour simuler l'envoi des données au serveur
        function sendToServer(data) {
            // Ici, vous implémenterez l'envoi réel des données à votre backend
            console.log('📡 Envoi au serveur:', data);
            
            // Exemple d'appel API (à décommenter et adapter)
            /*
            fetch('/api/hotspot/authenticate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Succès:', data);
            })
            .catch((error) => {
                console.error('Erreur:', error);
            });
            */
        }
        
        // Log pour debug
        console.log('=== MBEEJ FEPAL Hotspot ===');
        console.log('URL:', window.location.href);
        console.log('Paramètres reçus:', {routerId: displayRouterId, mac, ip});
        console.log('Configuration routeur:', router);
        
        // Envoyer les données au serveur au chargement
        sendToServer({
            action: 'page_load',
            routerId: displayRouterId,
            routerName: router.name,
            mac: mac,
            ip: ip,
            timestamp: new Date().toISOString()
        });
        
        // Vérifier si des paramètres spécifiques sont présents dans l'URL
        if (window.location.search.includes('router_id=2')) {
            console.log('🎯 Routeur 2 détecté - Configuration spéciale activée');
            // Ajouter des fonctionnalités spécifiques pour le routeur 2 ici
        } else if (window.location.search.includes('router_id=3')) {
            console.log('🎯 Routeur 3 détecté - Configuration spéciale activée');
            // Ajouter des fonctionnalités spécifiques pour le routeur 3 ici
        }
    </script>
</body>
</html>
