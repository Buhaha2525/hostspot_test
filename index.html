<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi MBEEJ - Authentification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            padding: 30px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }
        .price-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .price-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        .price-card.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .price {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        .duration {
            font-size: 14px;
            color: #666;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #5a67d8;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 MBEEJ FEPAL</h1>
        <div class="subtitle">Connexion haut débit sécurisée</div>
        
        <div class="info-card">
            <div class="info-label">📱 Appareil connecté</div>
            <div class="info-value" id="mac">Chargement...</div>
            <div class="info-label" style="margin-top: 10px;">💻 IP attribuée</div>
            <div class="info-value" id="ip">Chargement...</div>
            <div class="info-label" style="margin-top: 10px;">🏠 Routeur ID</div>
            <div class="info-value" id="routerId">Chargement...</div>
        </div>
        
        <h3 style="margin-bottom: 15px;">📦 Choisissez votre forfait</h3>
        
        <div class="price-card" data-price="1000" data-duration="24h">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div class="price">1 000 FCFA</div>
                    <div class="duration">Validité 24 heures</div>
                </div>
                <div style="font-size: 24px;">⚡</div>
            </div>
        </div>
        
        <div class="price-card" data-price="2000" data-duration="7d">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div class="price">2 000 FCFA</div>
                    <div class="duration">Validité 7 jours</div>
                </div>
                <div style="font-size: 24px;">🚀</div>
            </div>
        </div>
        
        <div class="price-card" data-price="5000" data-duration="30d">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div class="price">5 000 FCFA</div>
                    <div class="duration">Validité 30 jours</div>
                </div>
                <div style="font-size: 24px;">💎</div>
            </div>
        </div>
        
        <button onclick="processPayment()">💰 Payer avec Orange Money / Wave</button>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        // Récupérer les paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const routerId = urlParams.get('router_id') || '22';
        const mac = urlParams.get('mac') || '00:00:00:00:00:00';
        const ip = urlParams.get('ip') || '0.0.0.0';
        
        // Afficher les informations
        document.getElementById('routerId').innerText = routerId;
        document.getElementById('mac').innerText = mac;
        document.getElementById('ip').innerText = ip;
        
        let selectedPrice = null;
        let selectedDuration = null;
        
        // Gestion de la sélection des forfaits
        document.querySelectorAll('.price-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.price-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                selectedPrice = this.getAttribute('data-price');
                selectedDuration = this.getAttribute('data-duration');
            });
        });
        
        function processPayment() {
            if (!selectedPrice) {
                showMessage('Veuillez sélectionner un forfait', 'error');
                return;
            }
            
            showMessage('Redirection vers le paiement...', 'success');
            
            // Rediriger vers la page de paiement (à adapter selon votre solution)
            setTimeout(() => {
                alert(`Paiement de ${selectedPrice} FCFA pour ${selectedDuration}\n\nRouter: ${routerId}\nMAC: ${mac}\nIP: ${ip}\n\nDans un environnement réel, vous seriez redirigé vers Orange Money ou Wave.`);
                showMessage('✅ Authentification réussie ! Vous pouvez maintenant surfer.', 'success');
            }, 1500);
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
