<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi MBEEJ - Authentification Haute Vitesse</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #2d3436;
        }

        .auth-card {
            background: var(--glass-bg);
            border: none;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .header-section {
            background: rgba(0,0,0,0.03);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo-icon {
            font-size: 3rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .info-badge {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .info-badge i {
            color: #667eea;
            width: 25px;
        }

        .price-option {
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .price-option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .price-option.selected {
            border-color: #667eea;
            background: #f8faff;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .price-option.selected::after {
            content: '\f058';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 10px;
            right: 15px;
            color: #667eea;
        }

        .btn-pay {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.3s;
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
            opacity: 0.9;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card auth-card">
                
                <div class="header-section">
                    <div class="logo-icon"><i class="fa-solid fa-wifi"></i></div>
                    <h2 class="fw-bold mb-0">MBEEJ FEPAL</h2>
                    <p class="text-muted small">Portail d'accès Internet Ultra-Rapide</p>
                </div>

                <div class="card-body p-4">
                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <div class="info-badge">
                                <div class="small text-muted text-uppercase" style="font-size: 0.65rem;">Appareil</div>
                                <div class="fw-600 small text-truncate" id="mac"><i class="fa-solid fa-mobile-screen-button"></i> --:--</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="info-badge">
                                <div class="small text-muted text-uppercase" style="font-size: 0.65rem;">IP Client</div>
                                <div class="fw-600 small" id="ip"><i class="fa-solid fa-network-wired"></i> 0.0.0.0</div>
                            </div>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-layer-group me-2"></i>Sélectionnez votre offre</h6>

                    <div class="price-option d-flex align-items-center justify-content-between" data-price="1000" data-duration="24h">
                        <div class="d-flex align-items-center">
                            <div class="bg-light p-3 rounded-circle me-3"><i class="fa-solid fa-bolt text-warning fs-4"></i></div>
                            <div>
                                <div class="fw-bold">Pass 24 Heures</div>
                                <div class="small text-muted">Accès illimité</div>
                            </div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold text-primary">1 000 F</div>
                        </div>
                    </div>

                    <div class="price-option d-flex align-items-center justify-content-between" data-price="2000" data-duration="7d">
                        <div class="d-flex align-items-center">
                            <div class="bg-light p-3 rounded-circle me-3"><i class="fa-solid fa-rocket text-info fs-4"></i></div>
                            <div>
                                <div class="fw-bold">Pass Hebdo</div>
                                <div class="small text-muted">7 jours de surf</div>
                            </div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold text-primary">2 000 F</div>
                        </div>
                    </div>

                    <div class="price-option d-flex align-items-center justify-content-between" data-price="5000" data-duration="30d">
                        <div class="d-flex align-items-center">
                            <div class="bg-light p-3 rounded-circle me-3"><i class="fa-solid fa-gem text-primary fs-4"></i></div>
                            <div>
                                <div class="fw-bold">Pass Mensuel</div>
                                <div class="small text-muted">Le meilleur confort</div>
                            </div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold text-primary">5 000 F</div>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-pay w-100 mt-3" onclick="processPayment()">
                        <i class="fa-solid fa-wallet me-2"></i> Payer le forfait
                    </button>

                    <div id="statusMsg" class="mt-3 text-center d-none"></div>
                </div>

                <div class="card-footer bg-white border-0 text-center pb-4">
                    <div class="d-flex justify-content-center gap-3">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Orange_logo.svg/500px-Orange_logo.svg.png" height="25" alt="Orange">
                        <img src="https://wave.com/static/Wave-Logo-768x432.png" height="25" alt="Wave">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // URL Params Handling
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('mac').innerHTML = `<i class="fa-solid fa-mobile-screen-button"></i> ${urlParams.get('mac') || 'Non détecté'}`;
    document.getElementById('ip').innerHTML = `<i class="fa-solid fa-network-wired"></i> ${urlParams.get('ip') || '192.168.1.X'}`;

    let selectedData = { price: null, duration: null };

    // Selection logic
    document.querySelectorAll('.price-option').forEach(option => {
        option.addEventListener('click', function() {
            document.querySelectorAll('.price-option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            selectedData.price = this.getAttribute('data-price');
            selectedData.duration = this.getAttribute('data-duration');
        });
    });

    function processPayment() {
        const msgDiv = document.getElementById('statusMsg');
        
        if (!selectedData.price) {
            msgDiv.className = "mt-3 text-center text-danger small d-block";
            msgDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation me-1"></i> Veuillez choisir un forfait';
            return;
        }

        msgDiv.className = "mt-3 text-center text-primary small d-block";
        msgDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i> Initialisation du paiement sécurisé...';

        setTimeout(() => {
            // Simulation
            alert(`💰 Redirection vers la passerelle de paiement\nMontant: ${selectedData.price} FCFA\nDurée: ${selectedData.duration}`);
            msgDiv.className = "mt-3 text-center text-success small d-block";
            msgDiv.innerHTML = '<i class="fa-solid fa-circle-check me-1"></i> Paiement validé ! Connexion en cours...';
        }, 1500);
    }
</script>

</body>
</html>
