<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MbeejFepal Hotspot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <p>Redirection vers le portail...</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const routerId = urlParams.get('router_id');
        const mac = urlParams.get('mac');
        
        if (routerId) localStorage.setItem('router_id', routerId);
        if (mac) localStorage.setItem('mac', mac);
        
        window.location.href = 'hotspot.html';
    </script>
</body>
</html>
